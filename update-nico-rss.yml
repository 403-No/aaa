name: Update Nico Followings RSS

on:
  schedule:
    # 30分おきに実行 (UTC基準。日本時間は+9時間)
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # Actionsタブから手動実行も可能にする

permissions:
  contents: write

jobs:
  build-rss:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate RSS feed
        env:
          NICO_USER_SESSION: ${{ secrets.NICO_USER_SESSION }}
          NICO_OUTPUT_FILE: docs/nico_followings.xml
        run: |
          mkdir -p docs
          python nico_followings_rss.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/nico_followings.xml
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Nico followings RSS feed"
            git push
          fi
